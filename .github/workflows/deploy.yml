name: Build & deploy to Hostinger

# Push to main → build the React app, bundle the PHP API, and upload over SSH/SFTP.
# Server-side config.secret.php and uploads/ are left untouched.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix app ci
          npm --prefix app run build        # outputs to ./public_html

      - name: Bundle the PHP API into the web root
        run: |
          cp -r api public_html/api
          mkdir -p public_html/uploads
          # Strip secret/local files + the token-gated debug tools (diagnosis done).
          rm -f public_html/api/config.local.php \
                public_html/api/config.secret.php \
                public_html/api/dbcheck.php \
                public_html/api/mailtest.php

      - name: Deploy over SSH (SFTP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          port:     ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "public_html"
          strip_components: 1
          target: ${{ secrets.SSH_TARGET }}
          overwrite: true
