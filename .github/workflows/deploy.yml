name: Build & deploy to Hostinger

# Push to main → build the React app, bundle the PHP API, and upload to Hostinger
# over SSH/SFTP (Hostinger blocks plain FTP from CI; SFTP on port 65002 works).
# Your server-side config.secret.php and uploads/ are left untouched.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix app ci
          npm --prefix app run build        # outputs to ./public_html

      - name: Bundle the PHP API into the web root
        run: |
          cp -r api public_html/api
          mkdir -p public_html/uploads
          # never ship local-only / debug files (config.secret.php on the server is preserved)
          rm -f public_html/api/config.local.php \
                public_html/api/config.secret.php \
                public_html/api/dbcheck.php \
                public_html/api/mailtest.php

      - name: Find the real web root (one-time debug)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          port:     ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "HOME=$HOME"
            echo "--- all public_html directories under your account ---"
            find "$HOME" -maxdepth 4 -name public_html -type d 2>/dev/null
            echo "--- where the deploy has been landing (current SSH_TARGET) ---"
            ls -la "${{ secrets.SSH_TARGET }}" 2>/dev/null | head -15 || echo "(SSH_TARGET path not listable)"

      - name: Deploy over SSH (SFTP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}        # 195.35.39.90
          port:     ${{ secrets.SSH_PORT }}        # 65002 (Hostinger SSH port)
          username: ${{ secrets.SSH_USERNAME }}    # e.g. u112489407
          password: ${{ secrets.SSH_PASSWORD }}    # your SSH password
          source: "public_html"                    # the built web root (dotfiles incl.)
          strip_components: 1                       # drop the "public_html/" prefix
          target: ${{ secrets.SSH_TARGET }}        # /home/u112489407/domains/heartofjerome.com/public_html
          overwrite: true
